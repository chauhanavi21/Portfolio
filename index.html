<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#030712" />

    <!-- Primary meta -->
    <title>Avi Chauhan — Software Engineer & AI/ML Engineer</title>
    <meta
      name="description"
      content="Avi Chauhan — Software Engineer, AWS Certified Solutions Architect, and AI/ML engineer. Building production RAG pipelines, full-stack apps, and cloud-native systems."
    />
    <meta
      name="keywords"
      content="Avi Chauhan, Software Engineer, AI Engineer, Machine Learning, AWS Solutions Architect, AWS AI Practitioner, React, Next.js, Full-Stack Developer, Portfolio"
    />
    <meta name="author" content="Avi Chauhan" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://chauhanavi.com/" />

    <!-- Icons / PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/profile.jpg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Avi Chauhan" />
    <meta property="og:title" content="Avi Chauhan — Software Engineer & AI/ML Engineer" />
    <meta
      property="og:description"
      content="Portfolio of Avi Chauhan. Software engineering, AI/ML, and AWS-certified cloud architecture."
    />
    <meta property="og:url" content="https://chauhanavi.com/" />
    <meta property="og:image" content="https://chauhanavi.com/og-cover.png" />
    <meta property="og:image:alt" content="Avi Chauhan — portfolio cover" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Avi Chauhan — Software Engineer & AI/ML Engineer" />
    <meta
      name="twitter:description"
      content="Portfolio of Avi Chauhan. Software engineering, AI/ML, and AWS-certified cloud architecture."
    />
    <meta name="twitter:image" content="https://chauhanavi.com/og-cover.png" />

    <!-- Fonts (preconnect + swap for LCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
    />

    <!-- Preload hero portrait for faster LCP -->
    <link rel="preload" as="image" href="/profile.jpg" fetchpriority="high" />

    <!-- JSON-LD: Person -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Avi Chauhan",
        "url": "https://chauhanavi.com/",
        "image": "https://chauhanavi.com/profile.jpg",
        "jobTitle": "Software Engineer & AI/ML Engineer",
        "description": "Software engineer, AWS Certified Solutions Architect, and AI/ML engineer building production RAG pipelines, full-stack apps, and cloud-native systems.",
        "sameAs": [
          "https://github.com/chauhanavi21",
          "https://www.linkedin.com/in/avi-chauhan-1678a4204/"
        ],
        "knowsAbout": [
          "Machine Learning",
          "Generative AI",
          "Full-Stack Development",
          "AWS",
          "Python",
          "React",
          "FastAPI"
        ],
        "hasCredential": [
          {
            "@type": "EducationalOccupationalCredential",
            "name": "AWS Certified Solutions Architect – Associate",
            "credentialCategory": "certification"
          },
          {
            "@type": "EducationalOccupationalCredential",
            "name": "AWS Certified AI Practitioner (AIF-C01)",
            "credentialCategory": "certification"
          }
        ]
      }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Avi Chauhan",
        "url": "https://chauhanavi.com/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

</html>
